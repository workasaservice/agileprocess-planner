name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'Features/**'

jobs:
  detect-secrets:
    name: Detect secrets in JSON files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check JSON files for real email addresses
        run: |
          # Fail if any JSON file contains an email address that is NOT @example.com or @yourdomain.com
          if grep -rE '"[^"]+@(?!example\.com\b|yourdomain\.com\b)[^"]+\.[^"]+"' --include="*.json" \
               --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "::error::One or more JSON files contain real-looking email addresses."
            echo "Replace them with example.com or yourdomain.com placeholders."
            exit 1
          fi

      - name: Check JSON files for plaintext passwords
        run: |
          # Fail if any committed JSON file contains a "password" key with a non-empty value
          if grep -rE '"password"\s*:\s*"[^"]+"' --include="*.json" \
               --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "::error::One or more JSON files contain a non-empty password field."
            echo "Remove the password field or set it to an empty string (\"\")."
            exit 1
          fi
